name: minpro2
description: "Todo List App with Supabase Integration"
publish_to: 'none'
version: 0.2.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.4
  intl: ^0.19.0
  table_calendar: ^3.1.2
  flutter_dotenv: ^5.2.1
  provider: ^6.1.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
